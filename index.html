<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食悠餐桌 每日收支</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#222;font-size:15px;}
h1{font-size:18px;font-weight:600;padding:14px 16px;background:#fff;border-bottom:1px solid #e8e6e0;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e6e0;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:10px 4px;font-size:13px;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:#222;border-bottom-color:#222;font-weight:500;}
.page{display:none;padding:16px 0;}.page.active{display:block;}
.wrap{max-width:640px;margin:0 auto;padding:0 16px;}
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.date-bar input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;}
.tbtn{padding:9px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.scard{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e8e6e0;}
.scard .lbl{font-size:11px;color:#888;margin-bottom:4px;}
.scard .val{font-size:20px;font-weight:600;}
.block{background:#fff;border-radius:12px;border:1px solid #e8e6e0;padding:16px;margin-bottom:12px;}
.block h3{font-size:14px;font-weight:600;margin-bottom:14px;color:#333;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:12px;color:#666;display:flex;align-items:center;gap:5px;}
.fld input,.fld select{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;}
.add-btn{width:100%;margin-top:10px;padding:10px;border:none;border-radius:8px;background:#222;color:#fff;font-size:14px;cursor:pointer;font-weight:500;}
.imp-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#1565c0;color:#fff;font-size:15px;cursor:pointer;font-weight:600;margin-bottom:14px;}
.lblock{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.lrow{display:grid;grid-template-columns:1fr auto auto;font-size:13px;padding:11px 14px;border-top:1px solid #f0ede8;align-items:center;gap:8px;}
.lrow:first-child{border-top:none;}
.del{background:none;border:none;cursor:pointer;color:#bbb;font-size:15px;padding:2px 4px;}
.del:hover{color:#e53935;}
.empty{padding:28px;text-align:center;font-size:13px;color:#aaa;}
.tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;margin:2px 2px 2px 0;}
.tag-imp{background:#e8eaf6;color:#3949ab;font-size:10px;}
.drow{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid #f0ede8;}
.drow:last-child{border-bottom:none;}
.no-data{text-align:center;padding:40px;color:#aaa;font-size:14px;}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0ede8;}
.cat-item:last-child{border-bottom:none;}
.cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.cname{flex:1;font-size:14px;}
.cedit,.cdel{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;padding:4px 8px;}
.cedit:hover{color:#333;}.cdel:hover{color:#e53935;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px;}
.cdot-sel{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.cdot-sel.on{border-color:#222;}
.add-row{display:flex;gap:8px;align-items:center;}
.add-row input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;}
.add-row button{padding:9px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;}
.sec-lbl{font-size:12px;font-weight:600;color:#888;margin:4px 0 8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.notice{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1;}
.day-block{background:#fff;border-radius:12px;border:1px solid #e8e6e0;margin-bottom:10px;overflow:hidden;}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;}
.day-header:hover{background:#fafafa;}
.day-header .dh-left{font-weight:600;font-size:14px;}
.day-header .dh-right{display:flex;align-items:center;gap:10px;font-size:13px;}
.day-detail{display:none;border-top:1px solid #f0ede8;}
.day-detail.open{display:block;}
.cf-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px;}
.cf-table th{background:#f5f4f0;padding:8px 12px;text-align:left;font-weight:500;font-size:12px;color:#666;}
.cf-table td{padding:8px 12px;border-top:1px solid #f0ede8;}
.cf-table tr:first-child td{border-top:none;}
.cf-in{color:#2e7d32;font-weight:500;}
.cf-out{color:#c62828;font-weight:500;}
.cf-bal{font-weight:600;}
.loading-bar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:#1565c0;z-index:9999;animation:slide 1s infinite;}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;white-space:nowrap;}
.sync-status{font-size:11px;color:#aaa;text-align:right;padding:4px 0 8px;}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div id="edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;overflow-y:auto;">
  <div style="background:#fff;max-width:500px;margin:40px auto;border-radius:16px;padding:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:16px;font-weight:600;">編輯記錄</h3>
      <button onclick="closeEditModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;">✕</button>
    </div>
    <div id="edit-modal-body"></div>
    <div style="display:flex;gap:8px;margin-top:20px;">
      <button onclick="closeEditModal()" style="flex:1;padding:11px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;">取消</button>
      <button onclick="saveEdit()" style="flex:1;padding:11px;border:none;border-radius:8px;background:#222;color:#fff;font-size:14px;cursor:pointer;font-weight:500;">儲存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<h1>食悠餐桌 每日收支</h1>
<div class="wrap">
<div class="tabs">
  <button class="tab active" id="tab-entry" onclick="sw('entry')">每日輸入</button>
  <button class="tab" id="tab-history" onclick="sw('history')">歷史記錄</button>
  <button class="tab" id="tab-summary" onclick="sw('summary')">月匯總</button>
  <button class="tab" id="tab-settings" onclick="sw('settings')">類別設定</button>
  <button class="tab" id="tab-pl" onclick="sw('pl')">損益表</button>
  <button class="tab" id="tab-search" onclick="sw('search')">查詢</button>
</div>

<div class="page active" id="page-entry">
  <div class="date-bar">
    <input type="date" id="entry-date">
    <button class="tbtn" onclick="setToday()">今天</button>
  </div>
  <div class="sync-status" id="sync-status">⏳ 載入中...</div>
  <div class="sgrid">
    <div class="scard"><div class="lbl">今日收入</div><div class="val" id="ti" style="color:#2e7d32;">$0</div></div>
    <div class="scard"><div class="lbl">今日支出</div><div class="val" id="te" style="color:#c62828;">$0</div></div>
    <div class="scard"><div class="lbl">今日結餘</div><div class="val" id="tp">$0</div></div>
  </div>
  <div class="block">
    <h3>收入登錄</h3>
    <div id="pay-inputs"></div>
    <div class="row2">
      <div class="fld"><label>收入類型</label>
        <select id="in-type">
          <option value="operating">營業收入</option>
          <option value="nonoperating">業外收入</option>
        </select>
      </div>
      <div class="fld"><label>備註</label><input type="text" id="in-note" placeholder="選填"></div>
    </div>
    <button class="add-btn" onclick="addIncome()">＋ 新增收入</button>
  </div>
  <div class="block">
    <h3>支出登錄</h3>
    <div class="row2">
      <div class="fld"><label>類別</label><select id="exp-cat"></select></div>
      <div class="fld"><label>金額</label><input type="number" id="exp-amount" placeholder="0" min="0"></div>
    </div>
    <div class="row2" style="margin-top:0;">
      <div class="fld"><label>費用歸屬月</label><input type="month" id="exp-accrual" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;"></div>
      <div class="fld"><label>說明</label><input type="text" id="exp-note" placeholder="選填"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:2px;">
      <input type="checkbox" id="exp-noncash" style="width:16px;height:16px;cursor:pointer;">
      <label for="exp-noncash" style="font-size:13px;color:#666;cursor:pointer;">非現金支出（如攤提，不計入現金流）</label>
    </div>
    <button class="add-btn" onclick="addExpense()">＋ 新增支出</button>
  </div>
  <div class="block">
    <h3>行動支付入帳</h3>
    <p style="font-size:12px;color:#888;margin-bottom:12px;">記錄 Line Pay、街口、悠遊卡實際撥款入銀行的日期與金額（與當日營業收入分開）</p>
    <div class="row2">
      <div class="fld"><label>支付平台</label>
        <select id="settle-cat">
          <option value="linepay">Line Pay</option>
          <option value="jkopay">街口支付</option>
          <option value="easycard">悠遊卡</option>
        </select>
      </div>
      <div class="fld"><label>入帳金額</label>
        <input type="number" id="settle-amount" placeholder="0" min="0">
      </div>
    </div>
    <div class="fld" style="margin-bottom:0"><label>備註</label>
      <input type="text" id="settle-note" placeholder="例：扣手續費後實收">
    </div>
    <button class="add-btn" style="background:#1565c0;" onclick="addSettle()">＋ 新增入帳記錄</button>
  </div>
  <div class="block">
    <h3>存入銀行</h3>
    <p style="font-size:12px;color:#888;margin-bottom:12px;">記錄當日將現金或收款存入銀行帳戶的金額</p>
    <div class="row2">
      <div class="fld"><label>存款類型</label>
        <select id="deposit-type">
          <option value="cash">現金存入</option>
          <option value="transfer_in">匯款收入（租金／客戶）</option>
          <option value="transfer_out">匯款支出</option>
        </select>
      </div>
      <div class="fld"><label>金額</label>
        <input type="number" id="deposit-amount" placeholder="0" min="0">
      </div>
    </div>
    <div class="fld" style="margin-bottom:0"><label>備註</label>
      <input type="text" id="deposit-note" placeholder="例：存入現金、租客匯款...">
    </div>
    <button class="add-btn" style="background:#5c6bc0;" onclick="addDeposit()">＋ 新增銀行記錄</button>
  </div>
  <div class="sec-lbl">今日明細</div>
  <div class="lblock"><div id="today-list"><div class="empty">尚無記錄</div></div></div>
</div>

<div class="page" id="page-history">
  <div class="date-bar" style="margin-bottom:12px;"><input type="month" id="history-month" style="flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;"></div>
  <div id="history-list"><div class="no-data">選擇月份查看記錄</div></div>
</div>

<div class="page" id="page-summary">
  <div class="date-bar" style="margin-bottom:8px;"><input type="month" id="summary-month" style="flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:12px;">
    <div class="fld" style="margin-bottom:0;">
      <label style="font-size:12px;color:#666;">期初現金</label>
      <input type="number" id="opening-cash" placeholder="0" min="0" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;" oninput="updateOpeningTotal()">
    </div>
    <div class="fld" style="margin-bottom:0;">
      <label style="font-size:12px;color:#666;">期初銀行餘額</label>
      <input type="number" id="opening-bank" placeholder="0" min="0" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;" oninput="updateOpeningTotal()">
    </div>
    <div style="display:flex;align-items:flex-end;gap:6px;">
      <button onclick="saveSettings()" style="padding:9px 14px;border:1px solid #5c6bc0;border-radius:8px;background:#fff;color:#5c6bc0;font-size:13px;cursor:pointer;white-space:nowrap;">儲存</button>
      <button onclick="renderSummary()" style="padding:9px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;">計算</button>
    </div>
  </div>
  <div style="font-size:13px;color:#666;margin-bottom:12px;">期初可用餘額：<b id="opening-total" style="color:#1565c0;">$0</b></div>
  <div id="summary-content"><div class="no-data">選擇月份查看匯總</div></div>
</div>

<div class="page" id="page-pl">
  <div class="date-bar" style="margin-bottom:12px;">
    <select id="pl-year" style="flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;"></select>
    <button onclick="renderPL()" style="padding:9px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;">計算</button>
  </div>
  <div id="pl-content"><div class="no-data">選擇年份查看損益表</div></div>
</div>

<div class="page" id="page-search">
  <div class="block" style="margin-bottom:12px;">
    <h3 style="margin-bottom:14px;">查詢條件</h3>

    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button id="sq-tab-month" onclick="switchSearchTab('month')" style="flex:1;padding:8px;border:1px solid #222;border-radius:8px;background:#222;color:#fff;font-size:13px;cursor:pointer;font-weight:500;">月份查詢</button>
      <button id="sq-tab-range" onclick="switchSearchTab('range')" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;font-size:13px;cursor:pointer;">日期範圍查詢</button>
    </div>

    <div id="sq-month-panel">
      <div class="fld" style="margin-bottom:10px;">
        <label>月份</label>
        <input type="month" id="sq-month" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;">
      </div>
    </div>

    <div id="sq-range-panel" style="display:none;">
      <div class="row2" style="margin-bottom:10px;">
        <div class="fld"><label>開始日期</label><input type="date" id="sq-start" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;width:100%;"></div>
        <div class="fld"><label>結束日期</label><input type="date" id="sq-end" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;width:100%;"></div>
      </div>
    </div>

    <div class="row2" style="margin-bottom:10px;">
      <div class="fld">
        <label>類型</label>
        <select id="sq-type" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
          <option value="all">全部</option>
          <option value="income">收入</option>
          <option value="expense">支出</option>
          <option value="settle">行動支付入帳</option>
          <option value="deposit">銀行存款</option>
        </select>
      </div>
      <div class="fld">
        <label>類別</label>
        <select id="sq-cat" style="padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
          <option value="all">全部類別</option>
        </select>
      </div>
    </div>

    <button class="add-btn" onclick="runSearch()">🔍 查詢</button>
  </div>

  <div id="search-result"></div>
</div>

<div class="page" id="page-settings">
  <div class="notice" id="imp-notice">📦 已內嵌 1～3月歷史資料（206筆），點下方按鈕匯入。</div>
  <button class="imp-btn" id="imp-btn" onclick="importHistorical()">📥 匯入 1～3月 歷史資料</button>
  <div class="block" style="margin-bottom:12px;">
    <h3>收入支付方式</h3>
    <div id="pay-cat-list"></div>
    <div class="sec-lbl" style="margin-top:14px;">選擇顏色</div>
    <div class="color-row" id="pay-color-row"></div>
    <div class="add-row">
      <input type="text" id="new-pay-name" placeholder="新增支付方式">
      <button onclick="addPayCat()">新增</button>
    </div>
  </div>
  <div class="block">
    <h3>支出類別</h3>
    <div id="exp-cat-list"></div>
    <div class="sec-lbl" style="margin-top:14px;">選擇顏色</div>
    <div class="color-row" id="exp-color-row"></div>
    <div class="add-row">
      <input type="text" id="new-exp-name" placeholder="新增支出類別">
      <button onclick="addExpCat()">新增</button>
    </div>
  </div>
</div>
</div>

var API = 'https://script.google.com/macros/s/AKfycbwicwSWLGZivIVMtrVMmJx2ORJ0G-SFhGC5rPtbSIQgToCKgfKcq2wbxv2AzNVf_7Wg/exec';

function showLoading(on) {
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
}
function showToast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok === false ? '#c62828' : '#323232';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}
function setSyncStatus(msg) {
  var el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

function apiGet(params, cb) {
  var url = API + '?' + Object.keys(params).map(function(k){ return k + '=' + encodeURIComponent(params[k]); }).join('&');
  showLoading(true);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){ showLoading(false); cb(null, data); })
    .catch(function(err){ showLoading(false); cb(err); });
}

function apiPost(body, cb) {
  showLoading(true);
  fetch(API, {
    method: 'POST',
    body: JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(data){ showLoading(false); cb(null, data); })
    .catch(function(err){ showLoading(false); cb(err); });
}

function load() {
  setSyncStatus('⏳ 同步中...');
  apiGet({action:'getCats'}, function(err, data) {
    if (err || !data.ok) {
      payCats = DEF_PAY.map(function(x){ return {id:x.id,name:x.name,color:x.color}; });
      expCats = DEF_EXP.map(function(x){ return {id:x.id,name:x.name,color:x.color}; });
      setSyncStatus('⚠️ 類別載入失敗，使用預設值');
    } else {
      payCats = (data.payCats && data.payCats.length) ? data.payCats : DEF_PAY.map(function(x){ return {id:x.id,name:x.name,color:x.color}; });
      expCats = (data.expCats && data.expCats.length) ? data.expCats : DEF_EXP.map(function(x){ return {id:x.id,name:x.name,color:x.color}; });
    }
    renderPayInputs();
    renderExpSelect();
    loadSettings();
  });
}

function loadSettings() {
  apiGet({action:'getSettings'}, function(err, data) {
    if (!err && data.ok && data.settings) {
      var s = data.settings;
      window._settingsCache = s;
      if (s.openingCash) {
        var el = document.getElementById('opening-cash');
        if (el) el.value = s.openingCash;
      }
      if (s.openingBank) {
        var el2 = document.getElementById('opening-bank');
        if (el2) el2.value = s.openingBank;
      }
      updateOpeningTotal();
    }
    loadRecords();
  });
}

function loadRecords() {
  apiGet({action:'getRecords'}, function(err, data) {
    if (err || !data.ok) {
      setSyncStatus('⚠️ 記錄載入失敗');
      showToast('載入失敗，請重新整理', false);
      return;
    }
    records = data.data || [];
    var now = new Date();
    var ts = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    setSyncStatus('✅ 已同步 ' + ts + '　共 ' + records.length + ' 筆');
    renderTodayList();
    updateSum();
  });
}

function sw(tab) {

    document.getElementById('tab-'+id).classList.toggle('active', id===tab);
    document.getElementById('page-'+id).classList.toggle('active', id===tab);

  if (tab === 'history') renderHistory();

function incTotal(r) {
  return payCats.reduce(function(s,p) { return s + ((r.pays && r.pays[p.id]) || 0); }, 0);
}

function addIncome() {
  var date = gd(); if (!date) { alert('請先選擇日期'); return; }
  var pays = {}, total = 0;
  payCats.forEach(function(p) {
    var el = document.getElementById('pay-' + p.id);
    var v = el ? (parseFloat(el.value) || 0) : 0;
    pays[p.id] = v; total += v;
  });
  if (!total) { alert('請輸入收入金額'); return; }
  var inType = document.getElementById('in-type') ? document.getElementById('in-type').value : 'operating';
  var rec = {id:uid(), date:date, type:'income', pays:pays, note:document.getElementById('in-note').value.trim(), inType:inType};
  payCats.forEach(function(p) { var el = document.getElementById('pay-'+p.id); if(el) el.value = ''; });
  document.getElementById('in-note').value = '';
  records.push(rec);
  renderTodayList(); updateSum();
  apiPost({action:'addRecord', record:rec}, function(err, data){
    if (err || !data.ok) { showToast('儲存失敗，請重試', false); records.pop(); renderTodayList(); updateSum(); return; }
    showToast('✓ 收入已儲存');
  });
}

function deleteRecord(id) {
  if (!confirm('確定刪除？')) return;
  var backup = records.slice();
  records = records.filter(function(r) { return r.id !== id; });
  renderTodayList(); updateSum();
  apiPost({action:'deleteRecord', id:id}, function(err, data){
    if (err || !data.ok) {
      showToast('刪除失敗，請重試', false);
      records = backup; renderTodayList(); updateSum();
      return;
    }
    showToast('✓ 已刪除');
  });
}

    var isImp = r.id && r.id.indexOf('imp_') === 0;

    if (r.type === 'income') {
      var tags = payCats.filter(function(p){ return r.pays && r.pays[p.id]; }).map(function(p){
        return '<span class="tag" style="background:' + p.color + '22;color:' + p.color + ';">' + p.name + ' ' + fmt(r.pays[p.id]) + '</span>';
      }).join('');
      return '<div class="lrow"><div>' + impTag + tags
        + (r.note ? '<div style="font-size:12px;color:#888;margin-top:3px;">' + r.note + '</div>' : '')
        + '</div><div style="font-weight:600;white-space:nowrap;">' + fmt(incTotal(r))
        + '</div><button class="del" data-id="' + r.id + '" onclick="deleteRecord(this.dataset.id)">✕</button></div>';

      var DC = {cash:'#388e3c', transfer_in:'#5c6bc0', transfer_out:'#e53935'};
      var dc = DC[r.cat] || '#5c6bc0';
      var dl = DL[r.cat] || r.cat;

        + '<span class="tag" style="background:#ede7f6;color:#5c6bc0;font-size:10px;">銀行</span> '
        + '<span class="tag" style="background:' + dc + '22;color:' + dc + ';">' + dl + '</span>'
        + (r.note ? '<div style="font-size:12px;color:#888;margin-top:3px;">' + r.note + '</div>' : '')
        + '</div><div style="font-weight:600;color:' + (isOut?'#c62828':'#5c6bc0') + ';white-space:nowrap;">'
        + (isOut?'-':'') + fmt(r.amount)
        + '</div><button class="del" data-id="' + r.id + '" onclick="deleteRecord(this.dataset.id)">✕</button></div>';
    } else if (r.type === 'settle') {
      var SL = {linepay:'Line Pay', jkopay:'街口支付', easycard:'悠遊卡'};
      var SC = {linepay:'#2196f3', jkopay:'#9c27b0', easycard:'#ff9800'};

      var sl = SL[r.cat] || r.cat;
      return '<div class="lrow"><div>'
        + '<span class="tag" style="background:#e3f2fd;color:#1565c0;font-size:10px;">入帳</span> '
        + '<span class="tag" style="background:' + sc + '22;color:' + sc + ';">' + sl + '</span>'
        + (r.note ? '<div style="font-size:12px;color:#888;margin-top:3px;">' + r.note + '</div>' : '')
        + '</div><div style="font-weight:600;color:#1565c0;white-space:nowrap;">' + fmt(r.amount)
        + '</div><button class="del" data-id="' + r.id + '" onclick="deleteRecord(this.dataset.id)">✕</button></div>';
    } else {
      var cat = expCats.find(function(e){ return e.id === r.cat; }) || {name:r.cat, color:'#888'};
      return '<div class="lrow"><div>' + impTag
        + '<span class="tag" style="background:' + cat.color + '22;color:' + cat.color + ';">' + cat.name + '</span>'
        + (r.note ? '<div style="font-size:12px;color:#888;margin-top:3px;">' + r.note + '</div>' : '')
        + '</div><div style="font-weight:600;color:#c62828;white-space:nowrap;">' + fmt(r.amount)
        + '</div><button class="del" data-id="' + r.id + '" onclick="deleteRecord(this.dataset.id)">✕</button></div>';
    }
  }).join('');

function updateSum() {
  var date = gd(); var inc = 0, exp = 0;
  records.filter(function(r){ return r.date === date; }).forEach(function(r){
    if (r.type === 'income') inc += incTotal(r);
    else if (r.type === 'expense' && !r.noncash) exp += r.amount || 0;
    // settle、deposit、noncash 不算在今日收支
  });
  document.getElementById('ti').textContent = fmt(inc);
  document.getElementById('te').textContent = fmt(exp);
  var p = inc - exp;
  var pe = document.getElementById('tp');
  pe.textContent = fmt(p);
  pe.style.color = p >= 0 ? '#2e7d32' : '#c62828';
}

  if (!list.length) { el.innerHTML = '<div class="no-data">該月份無記錄</div>'; return; }
  var byDate = {};
  list.forEach(function(r){ if (!byDate[r.date]) byDate[r.date] = []; byDate[r.date].push(r); });

    var inc = 0, exp = 0, settle = 0;
    byDate[d].forEach(function(r){
      if (r.type==='income') inc += incTotal(r);
      else if (r.type==='settle') settle += r.amount||0;
      else exp += r.amount||0;

    var profit = inc - exp;
    var SL = {linepay:'Line Pay', jkopay:'街口支付', easycard:'悠遊卡'};

        var tags = payCats.filter(function(p){ return r.pays && r.pays[p.id]; }).map(function(p){
          return '<span style="font-size:11px;background:' + p.color + '22;color:' + p.color + ';padding:2px 6px;border-radius:10px;margin-right:2px;">' + p.name + ' ' + fmt(r.pays[p.id]) + '</span>';

          + '<span style="font-size:11px;background:' + sc + '22;color:' + sc + ';padding:2px 6px;border-radius:10px;">' + sl + '</span>'
          + (r.note ? '<div style="font-size:11px;color:#aaa;">' + r.note + '</div>' : '') + '</td>'
          + '<td class="cf-in" style="text-align:right;">' + fmt(r.amount) + '</td>'
          + '<td style="text-align:right;white-space:nowrap;"><button style="background:none;border:none;cursor:pointer;color:#aaa;font-size:13px;padding:2px 4px;" data-id="' + r.id + '" onclick="copyRecord(this.dataset.id)" title="複製">📋</button><button style="background:none;border:none;cursor:pointer;color:#aaa;font-size:12px;padding:2px 4px;" data-id="' + r.id + '" onclick="openEditModal(this.dataset.id)">✏️</button><button class="del" data-id="' + r.id + '" onclick="deleteFromHistory(this.dataset.id)">✕</button></td></tr>';
      } else {
        var cat = expCats.find(function(e){ return e.id === r.cat; }) || {name:r.cat, color:'#888'};
        var ncTag = r.noncash ? '<span style="font-size:10px;background:#f3e5f5;color:#7b1fa2;padding:1px 5px;border-radius:10px;margin-right:4px;">非現金</span>' : '';
        return '<tr><td>' + impTag + ncTag + '<span style="font-size:11px;background:' + cat.color + '22;color:' + cat.color + ';padding:2px 6px;border-radius:10px;">' + cat.name + '</span>'

function copyRecord(id) {
  var r = records.find(function(rec){ return rec.id === id; });
  if (!r) return;

  // 建立複本
  var now = new Date();
  var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

  var copy = JSON.parse(JSON.stringify(r));
  copy.id = uid();
  copy.date = today;

  // 開啟編輯 Modal，預填複本資料
  editingId = null; // 設為 null 表示新增，不是修改
  copyingRecord = copy;

  var body = '';

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  editingId = null;
  copyingRecord = null;
}

function saveEdit() {
  // 複製模式：新增一筆記錄
  if (!editingId && copyingRecord) {
    var copy = copyingRecord;
    copy.date = document.getElementById('edit-date').value || copy.date;
    copy.note = document.getElementById('edit-note').value.trim();
    if (copy.type === 'income') {
      payCats.forEach(function(p){
        var el = document.getElementById('edit-pay-' + p.id);
        if (el) { if (!copy.pays) copy.pays = {}; copy.pays[p.id] = parseFloat(el.value)||0; }
      });
      var itEl = document.getElementById('edit-intype');
      if (itEl) copy.inType = itEl.value;
    } else if (copy.type === 'expense') {
      var catEl = document.getElementById('edit-cat');
      var amtEl = document.getElementById('edit-amount');
      var accEl = document.getElementById('edit-accrual');
      var ncEl = document.getElementById('edit-noncash');
      if (catEl) copy.cat = catEl.value;
      if (amtEl) copy.amount = parseFloat(amtEl.value)||0;
      if (accEl) copy.accrual = accEl.value;
      if (ncEl) copy.noncash = ncEl.checked ? 1 : 0;
    } else {
      var amtEl2 = document.getElementById('edit-amount');
      if (amtEl2) copy.amount = parseFloat(amtEl2.value)||0;
    }
    closeEditModal();
    records.push(copy);
    renderTodayList(); updateSum(); renderHistory();
    apiPost({action:'addRecord', record:copy}, function(err, data){
      if (err || !data.ok) { showToast('儲存失敗', false); records.pop(); return; }
      showToast('✓ 複製記錄已儲存');
    });
    copyingRecord = null;
    return;
  }

  if (!editingId) return;
  var r = records.find(function(rec){ return rec.id === editingId; });
  if (!r) return;

  // 更新資料
  var newDate = document.getElementById('edit-date').value;
  if (newDate) r.date = newDate;
  r.note = document.getElementById('edit-note').value.trim();

  if (r.type === 'income') {
    payCats.forEach(function(p){
      var el = document.getElementById('edit-pay-' + p.id);
      if (el) { if (!r.pays) r.pays = {}; r.pays[p.id] = parseFloat(el.value)||0; }
    });
    var inTypeEl = document.getElementById('edit-intype');
    if (inTypeEl) r.inType = inTypeEl.value;
  } else if (r.type === 'expense') {
    var catEl = document.getElementById('edit-cat');
    var amtEl = document.getElementById('edit-amount');
    var accEl = document.getElementById('edit-accrual');
    var ncEl = document.getElementById('edit-noncash');
    if (catEl) r.cat = catEl.value;
    if (amtEl) r.amount = parseFloat(amtEl.value)||0;
    if (accEl) r.accrual = accEl.value;
    if (ncEl) r.noncash = ncEl.checked ? 1 : 0;
  } else {
    var amtEl2 = document.getElementById('edit-amount');
    if (amtEl2) r.amount = parseFloat(amtEl2.value)||0;
  }

  closeEditModal();
  renderHistory();
  renderTodayList();
  updateSum();

  // 先刪後加
  apiPost({action:'deleteRecord', id:r.id}, function(err) {
    apiPost({action:'addRecord', record:r}, function(err2, data){
      if (err2 || !data || !data.ok) { showToast('儲存失敗，請重試', false); return; }
      showToast('✓ 修改已儲存');
    });
  });
}

function toggleDay(d) {
  var el = document.getElementById('detail-' + d);
  if (el) el.classList.toggle('open');
}

function deleteFromHistory(id) {
  if (!confirm('確定刪除？')) return;
  var backup = records.slice();
  records = records.filter(function(r){ return r.id !== id; });
  renderHistory();
  renderTodayList();
  updateSum();
  apiPost({action:'deleteRecord', id:id}, function(err, data){
    if (err || !data.ok) {
      showToast('刪除失敗，請重試', false);
      records = backup; renderHistory(); return;
    }
    showToast('✓ 已刪除');
  });
}

function renderSummary() {
  var month = document.getElementById('summary-month').value;
  var el = document.getElementById('summary-content');
  // 根據月份載入對應期初值
  if (month && window._settingsCache) {
    var sc = window._settingsCache;
    var cashKey = 'opening_cash_' + month;
    var bankKey = 'opening_bank_' + month;
    if (sc[cashKey] !== undefined) {
      var ce = document.getElementById('opening-cash');
      if (ce && !ce._userEdited) ce.value = sc[cashKey];
    }
    if (sc[bankKey] !== undefined) {
      var be = document.getElementById('opening-bank');
      if (be && !be._userEdited) be.value = sc[bankKey];
    }
    updateOpeningTotal();
  }
  if (!month) { el.innerHTML = '<div class="no-data">選擇月份</div>'; return; }
  var list = records.filter(function(r){ return r.date && r.date.startsWith(month); });
  if (!list.length) { el.innerHTML = '<div class="no-data">該月份無記錄</div>'; return; }
  var tInc=0, tExp=0, pT={}, eT={};
  payCats.forEach(function(p){ pT[p.id]=0; });
  expCats.forEach(function(e){ eT[e.id]=0; });
  list.forEach(function(r){
    if (r.type==='income') {
      payCats.forEach(function(p){ var v=(r.pays&&r.pays[p.id])||0; pT[p.id]+=v; tInc+=v; });
    } else if (r.type==='expense' && !r.noncash) { eT[r.cat]=(eT[r.cat]||0)+(r.amount||0); tExp+=r.amount||0; }
    // settle/deposit/noncash 不算在收支統計
  });
  var profit = tInc - tExp;
  el.innerHTML =
    '<div class="sgrid" style="margin-bottom:12px;">'
    + '<div class="scard"><div class="lbl">總收入</div><div class="val" style="color:#2e7d32;">' + fmt(tInc) + '</div></div>'
    + '<div class="scard"><div class="lbl">總支出</div><div class="val" style="color:#c62828;">' + fmt(tExp) + '</div></div>'
    + '<div class="scard"><div class="lbl">月結餘</div><div class="val" style="color:' + (profit>=0?'#2e7d32':'#c62828') + ';">' + fmt(profit) + '</div></div></div>'
    + '<div class="block" style="margin-bottom:12px;"><h3 style="margin-bottom:10px;">收入拆分</h3>'
    + payCats.map(function(p){
        return '<div class="drow"><span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:' + p.color + ';display:inline-block;"></span>' + p.name + '</span><span>' + fmt(pT[p.id]||0) + '</span></div>';
      }).join('')
    + '<div class="drow" style="font-weight:600;margin-top:4px;"><span>合計</span><span style="color:#2e7d32;">' + fmt(tInc) + '</span></div></div>'
    + '<div class="block"><h3 style="margin-bottom:10px;">支出拆分</h3>'
    + expCats.map(function(e){
        return '<div class="drow"><span style="display:flex;align-items:center;gap:6px;"><span style="width:9px;height:9px;border-radius:50%;background:' + e.color + ';display:inline-block;"></span>' + e.name + '</span><span>' + fmt(eT[e.id]||0) + '</span></div>';
      }).join('')
    + '<div class="drow" style="font-weight:600;margin-top:4px;"><span>合計</span><span style="color:#c62828;">' + fmt(tExp) + '</span></div></div>';

  // 入帳統計
  var SL = {linepay:'Line Pay', jkopay:'街口支付', easycard:'悠遊卡'};
  var SC = {linepay:'#2196f3', jkopay:'#9c27b0', easycard:'#ff9800'};
  var settleList = list.filter(function(r){ return r.type === 'settle'; });
  if (settleList.length) {
    var sT = {linepay:0, jkopay:0, easycard:0};
    settleList.forEach(function(r){ sT[r.cat] = (sT[r.cat]||0) + r.amount; });
    var totalSettle = settleList.reduce(function(s,r){ return s+r.amount; }, 0);
    el.innerHTML += '<div class="block" style="margin-top:12px;border-left:3px solid #1565c0;">'
      + '<h3 style="margin-bottom:10px;">行動支付入帳</h3>'
      + Object.keys(sT).filter(function(k){ return sT[k]>0; }).map(function(k){
          return '<div class="drow"><span style="display:flex;align-items:center;gap:6px;">'
            + '<span style="width:9px;height:9px;border-radius:50%;background:' + SC[k] + ';display:inline-block;"></span>'
            + SL[k] + '</span><span>' + fmt(sT[k]) + '</span></div>';
        }).join('')
      + '<div class="drow" style="font-weight:600;margin-top:4px;"><span>合計入帳</span><span style="color:#1565c0;">' + fmt(totalSettle) + '</span></div>'
      + '</div>';
  }

  // ── 現金流 ──
  var opening = parseFloat(document.getElementById('opening-cash').value) || 0;
  var openingBank = parseFloat(document.getElementById('opening-bank').value) || 0;

  var byDate2 = {};
  list.forEach(function(r){ if (!byDate2[r.date]) byDate2[r.date]=[]; byDate2[r.date].push(r); });
  var dates = Object.keys(byDate2).sort();

  // 行動支付未入帳
  var mobileSales = 0, mobileSettled = 0;
  list.forEach(function(r){
    if (r.type === 'income') {
      payCats.filter(function(p){ return p.id !== 'cash'; }).forEach(function(p){
        mobileSales += (r.pays && r.pays[p.id]) || 0;
      });
    }
    if (r.type === 'settle') mobileSettled += r.amount || 0;
  });
  var mobileUnsettle = mobileSales - mobileSettled;

  // 每日可用餘額流水
  var runBal = opening + openingBank;
  var cfRows = dates.map(function(d){
    var dayIn=0, dayExp=0, dayTransferOut=0;
    byDate2[d].forEach(function(r){
      if (r.type === 'income') {
        // 只有現金和匯款計入現金流，行動支付等入帳時才計
        var cashAmt = (r.pays && r.pays['cash']) || 0;
        var transferAmt = 0;
        payCats.forEach(function(p){
          if (p.id !== 'cash' && p.id !== 'linepay' && p.id !== 'jkopay' && p.id !== 'easycard') {
            transferAmt += (r.pays && r.pays[p.id]) || 0;
          }
        });
        dayIn += cashAmt + transferAmt;
      } else if (r.type === 'settle') {
        dayIn += r.amount || 0;
      } else if (r.type === 'deposit') {
        if (r.cat === 'transfer_in') dayIn += r.amount || 0;
        else if (r.cat === 'transfer_out') dayTransferOut += r.amount || 0;
      } else if (r.type === 'expense' && !r.noncash) {
        dayExp += r.amount || 0;
      }
    });
    runBal += dayIn - dayExp - dayTransferOut;
    return '<tr>'
      + '<td>' + d.slice(5) + '</td>'
      + '<td class="cf-in" style="text-align:right;">' + (dayIn>0?fmt(dayIn):'-') + '</td>'
      + '<td class="cf-out" style="text-align:right;">' + (dayExp>0?fmt(dayExp):'-') + '</td>'
      + '<td class="cf-bal" style="text-align:right;color:' + (runBal>=0?'#2e7d32':'#c62828') + ';">' + fmt(runBal) + '</td>'
      + '</tr>';
  }).join('');

  var closingBal = runBal;

  el.innerHTML += '<div class="block" style="margin-top:12px;border-left:3px solid #388e3c;">'
    + '<h3 style="margin-bottom:12px;">現金流</h3>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">'
    + '<div class="scard"><div class="lbl">期初可用餘額</div><div style="font-size:16px;font-weight:600;">' + fmt(opening+openingBank) + '</div></div>'
    + '<div class="scard"><div class="lbl">期末可用餘額</div><div style="font-size:16px;font-weight:600;color:' + (closingBal>=0?'#2e7d32':'#c62828') + ';">' + fmt(closingBal) + '</div></div>'
    + '<div class="scard"><div class="lbl">待入帳</div><div style="font-size:16px;font-weight:600;color:#e65100;">' + fmt(mobileUnsettle) + '</div></div>'
    + '</div>'
    + '<div style="overflow-x:auto;">'
    + '<table class="cf-table"><thead><tr>'
    + '<th>日期</th><th style="text-align:right;">收入</th><th style="text-align:right;">支出</th><th style="text-align:right;">可用餘額</th>'
    + '</tr></thead><tbody>' + cfRows + '</tbody></table>'
    + '</div></div>';
}

function updateOpeningTotal() {
  var cash = parseFloat(document.getElementById('opening-cash').value) || 0;
  var bank = parseFloat(document.getElementById('opening-bank').value) || 0;
  var el = document.getElementById('opening-total');
  if (el) el.textContent = fmt(cash + bank);
}

function renderColorRow(cid, sel, type) {
  var el = document.getElementById(cid);
  el.innerHTML = COLORS.map(function(c){
    return '<div class="cdot-sel' + (c===sel?' on':'') + '" style="background:' + c + ';" data-color="' + c + '" data-type="' + type + '"></div>';
  }).join('');
  el.querySelectorAll('.cdot-sel').forEach(function(dot){
    dot.addEventListener('click', function(){
      var c = this.getAttribute('data-color');
      var t = this.getAttribute('data-type');
      if (t === 'pay') setPayColor(c);
      else setExpColor(c);
    });
  });
}
function setPayColor(c) { selPC = c; renderColorRow('pay-color-row', selPC, 'pay'); }
function setExpColor(c) { selEC = c; renderColorRow('exp-color-row', selEC, 'exp'); }

      + '<span class="cname">' + cat.name + '</span>'

      + '<button class="cdel" data-type="exp" data-idx="' + i + '">✕</button></div>';
  }).join('') : '<div style="font-size:13px;color:#aaa;padding:8px 0;">尚無項目</div>';
  pEl.querySelectorAll('.cedit').forEach(function(b){ b.addEventListener('click', function(){ editCat(this.dataset.type, parseInt(this.dataset.idx)); }); });
  pEl.querySelectorAll('.cdel').forEach(function(b){ b.addEventListener('click', function(){ delCat(this.dataset.type, parseInt(this.dataset.idx)); }); });
  eEl.querySelectorAll('.cedit').forEach(function(b){ b.addEventListener('click', function(){ editCat(this.dataset.type, parseInt(this.dataset.idx)); }); });
  eEl.querySelectorAll('.cdel').forEach(function(b){ b.addEventListener('click', function(){ delCat(this.dataset.type, parseInt(this.dataset.idx)); }); });
  renderColorRow('pay-color-row', selPC, 'pay');
  renderColorRow('exp-color-row', selEC, 'exp');
}

function editCat(type, idx) {
  var cats = (type==='pay') ? payCats : expCats;
  var n = prompt('修改名稱：', cats[idx].name);
  if (n && n.trim()) { cats[idx].name = n.trim(); type==='pay'?saveP():saveE(); renderSettings(); renderPayInputs(); renderExpSelect(); }
}
function delCat(type, idx) {
  var cats = (type==='pay') ? payCats : expCats;
  if (!confirm('確定刪除「' + cats[idx].name + '」？')) return;
  cats.splice(idx, 1); type==='pay'?saveP():saveE(); renderSettings(); renderPayInputs(); renderExpSelect();
}
function addPayCat() {
  var n = document.getElementById('new-pay-name').value.trim(); if (!n) { alert('請輸入名稱'); return; }
  payCats.push({id:uid(), name:n, color:selPC}); saveP();
  document.getElementById('new-pay-name').value = '';
  renderSettings(); renderPayInputs();
}
function addExpCat() {
  var n = document.getElementById('new-exp-name').value.trim(); if (!n) { alert('請輸入名稱'); return; }
  expCats.push({id:uid(), name:n, color:selEC}); saveE();
  document.getElementById('new-exp-name').value = '';
  renderSettings(); renderExpSelect();
}

function initSearch() {
  // 更新類別下拉
  var catSel = document.getElementById('sq-cat');
  var type = document.getElementById('sq-type').value;
  catSel.innerHTML = '<option value="all">全部類別</option>';
  if (type === 'expense' || type === 'all') {
    expCats.forEach(function(e) {
      catSel.innerHTML += '<option value="exp-' + e.id + '">' + e.name + '</option>';
    });
  }
  if (type === 'income' || type === 'all') {
    payCats.forEach(function(p) {
      catSel.innerHTML += '<option value="pay-' + p.id + '">' + p.name + '</option>';
    });
  }
}

document.addEventListener('change', function(e) {
  if (e.target.id === 'sq-type') initSearch();
});

function runSearch() {
  var type = document.getElementById('sq-type').value;
  var cat = document.getElementById('sq-cat').value;
  var el = document.getElementById('search-result');

  // 篩選日期範圍
  var filtered = records.filter(function(r) {
    if (!r.date) return false;
    if (searchTabMode === 'month') {
      var month = document.getElementById('sq-month').value;
      if (!month) { el.innerHTML = '<div class="no-data">請選擇月份</div>'; return false; }
      return r.date.startsWith(month);
    } else {
      var start = document.getElementById('sq-start').value;
      var end = document.getElementById('sq-end').value;
      if (!start || !end) { el.innerHTML = '<div class="no-data">請選擇日期範圍</div>'; return false; }
      return r.date >= start && r.date <= end;
    }
  });

  if (!filtered.length) { el.innerHTML = '<div class="no-data">查無資料</div>'; return; }

  // 篩選類型
  if (type !== 'all') filtered = filtered.filter(function(r){ return r.type === type; });

  // 篩選類別
  if (cat !== 'all') {
    if (cat.startsWith('exp-')) {
      var catId = cat.slice(4);
      filtered = filtered.filter(function(r){ return r.type==='expense' && r.cat===catId; });
    } else if (cat.startsWith('pay-')) {
      var payId = cat.slice(4);
      filtered = filtered.filter(function(r){ return r.type==='income' && r.pays && r.pays[payId]; });
    }
  }

  if (!filtered.length) { el.innerHTML = '<div class="no-data">查無符合條件的資料</div>'; return; }

  // 排序：日期
  filtered.sort(function(a,b){ return a.date > b.date ? 1 : -1; });

  // 計算合計
  var totalInc = 0, totalExp = 0, totalOther = 0;

  var rows = filtered.map(function(r) {
    var isImp = r.id && r.id.indexOf('imp_') === 0;
    var impTag = isImp ? '<span style="font-size:10px;background:#e8eaf6;color:#3949ab;padding:1px 5px;border-radius:10px;margin-right:4px;">匯入</span>' : '';

    if (r.type === 'income') {
      var total = incTotal(r);
      totalInc += total;
      var tags = payCats.filter(function(p){ return r.pays&&r.pays[p.id]; }).map(function(p){
        return '<span style="font-size:11px;background:'+p.color+'22;color:'+p.color+';padding:2px 6px;border-radius:10px;margin-right:2px;">'+p.name+' '+fmt(r.pays[p.id])+'</span>';
      }).join('');
      return '<tr style="cursor:pointer;" onclick="openEditModal(\''+r.id+'\')" title="點擊編輯"><td style="padding:8px 10px;font-size:12px;color:#888;">'+r.date+'</td>'
        + '<td style="padding:8px 10px;">'+impTag+tags+(r.note?'<div style="font-size:11px;color:#aaa;">'+r.note+'</div>':'')+'</td>'
        + '<td style="padding:8px 10px;text-align:right;color:#2e7d32;font-weight:500;">'+fmt(total)+'</td></tr>';
    } else if (r.type === 'expense') {
      totalExp += r.amount||0;
      var cat2 = expCats.find(function(e){ return e.id===r.cat; })||{name:r.cat,color:'#888'};
      var ncTag = r.noncash ? '<span style="font-size:10px;background:#f3e5f5;color:#7b1fa2;padding:1px 5px;border-radius:10px;margin-right:4px;">非現金</span>' : '';
      var accrualDisplay = r.accrual ? String(r.accrual).slice(0,7) : r.date.slice(0,7);
      var accTag = (accrualDisplay && accrualDisplay !== r.date.slice(0,7)) ? '<span style="font-size:10px;background:#fff3e0;color:#e65100;padding:1px 5px;border-radius:10px;margin-left:4px;">歸'+accrualDisplay+'</span>' : '';
      return '<tr style="cursor:pointer;" onclick="openEditModal(\''+r.id+'\')" title="點擊編輯"><td style="padding:8px 10px;font-size:12px;color:#888;">'+r.date+'</td>'
        + '<td style="padding:8px 10px;">'+impTag+ncTag+'<span style="font-size:11px;background:'+cat2.color+'22;color:'+cat2.color+';padding:2px 6px;border-radius:10px;">'+cat2.name+'</span>'+accTag+(r.note?'<div style="font-size:11px;color:#aaa;">'+r.note+'</div>':'')+'</td>'
        + '<td style="padding:8px 10px;text-align:right;color:#c62828;font-weight:500;">-'+fmt(r.amount||0)+'</td></tr>';
    } else if (r.type === 'settle') {
      totalOther += r.amount||0;
      var SL2={linepay:'Line Pay',jkopay:'街口支付',easycard:'悠遊卡'};
      var SC2={linepay:'#2196f3',jkopay:'#9c27b0',easycard:'#ff9800'};
      return '<tr style="cursor:pointer;" onclick="openEditModal(\''+r.id+'\')" title="點擊編輯"><td style="padding:8px 10px;font-size:12px;color:#888;">'+r.date+'</td>'
        + '<td style="padding:8px 10px;"><span style="font-size:11px;background:#e3f2fd;color:#1565c0;padding:2px 6px;border-radius:10px;margin-right:4px;">入帳</span>'
        + '<span style="font-size:11px;background:'+(SC2[r.cat]||'#888')+'22;color:'+(SC2[r.cat]||'#888')+';padding:2px 6px;border-radius:10px;">'+(SL2[r.cat]||r.cat)+'</span>'
        + (r.note?'<div style="font-size:11px;color:#aaa;">'+r.note+'</div>':'')+'</td>'
        + '<td style="padding:8px 10px;text-align:right;color:#1565c0;font-weight:500;">'+fmt(r.amount||0)+'</td></tr>';
    } else if (r.type === 'deposit') {
      var DL2={cash:'現金存入',transfer_in:'匯款收入',transfer_out:'匯款支出'};
      var isOut = r.cat==='transfer_out';
      if (isOut) totalExp += r.amount||0; else totalOther += r.amount||0;
      return '<tr style="cursor:pointer;" onclick="openEditModal(\''+r.id+'\')" title="點擊編輯"><td style="padding:8px 10px;font-size:12px;color:#888;">'+r.date+'</td>'
        + '<td style="padding:8px 10px;"><span style="font-size:11px;background:#ede7f6;color:#5c6bc0;padding:2px 6px;border-radius:10px;">'+(DL2[r.cat]||r.cat)+'</span>'
        + (r.note?'<div style="font-size:11px;color:#aaa;">'+r.note+'</div>':'')+'</td>'
        + '<td style="padding:8px 10px;text-align:right;color:'+(isOut?'#c62828':'#5c6bc0')+';font-weight:500;">'+(isOut?'-':'')+fmt(r.amount||0)+'</td></tr>';
    }
    return '';
  }).join('');

  // 合計列
  var summaryHtml = '<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">';
  if (totalInc) summaryHtml += '<div class="scard" style="flex:1;min-width:100px;"><div class="lbl">收入合計</div><div style="font-size:16px;font-weight:600;color:#2e7d32;">'+fmt(totalInc)+'</div></div>';
  if (totalExp) summaryHtml += '<div class="scard" style="flex:1;min-width:100px;"><div class="lbl">支出合計</div><div style="font-size:16px;font-weight:600;color:#c62828;">'+fmt(totalExp)+'</div></div>';
  if (totalOther) summaryHtml += '<div class="scard" style="flex:1;min-width:100px;"><div class="lbl">其他合計</div><div style="font-size:16px;font-weight:600;color:#1565c0;">'+fmt(totalOther)+'</div></div>';
  summaryHtml += '<div class="scard" style="flex:1;min-width:100px;"><div class="lbl">筆數</div><div style="font-size:16px;font-weight:600;">'+filtered.length+'</div></div>';
  summaryHtml += '</div>';

  el.innerHTML = summaryHtml
    + '<div class="lblock"><table style="width:100%;border-collapse:collapse;">'
    + '<thead><tr style="background:#f5f4f0;">'
    + '<th style="padding:8px 10px;text-align:left;font-size:12px;color:#666;font-weight:500;">日期</th>'
    + '<th style="padding:8px 10px;text-align:left;font-size:12px;color:#666;font-weight:500;">項目</th>'
    + '<th style="padding:8px 10px;text-align:right;font-size:12px;color:#666;font-weight:500;">金額</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function initPLYear() {
  var sel = document.getElementById('pl-year');
  var now = new Date().getFullYear();
  sel.innerHTML = '';
  for (var y = now; y >= now - 3; y--) {
    sel.innerHTML += '<option value="' + y + '">' + y + ' 年</option>';
  }
}

function renderPL() {
  var year = document.getElementById('pl-year').value;
  var el = document.getElementById('pl-content');
  if (!year) { el.innerHTML = '<div class="no-data">請選擇年份</div>'; return; }

  // 找該年所有記錄（用歸屬月或記錄日期）
  var months = ['01','02','03','04','05','06','07','08','09','10','11','12'];

  // 收集每月資料
  var mData = {}; // mData['2026-01'] = {opInc, nonopInc, exp:{cat:amt}}
  months.forEach(function(m) { mData[year+'-'+m] = {opInc:0, nonopInc:0, exp:{}}; });

  records.forEach(function(r) {
    if (!r.date) return;
    var recMonth = r.date.slice(0,7);
    // 支出用歸屬月
    var month = (r.type === 'expense' && r.accrual) ? String(r.accrual).slice(0,7) : recMonth;
    if (!mData[month]) return; // 不在該年

    if (r.type === 'income') {
      var total = incTotal(r);
      if (r.inType === 'nonoperating') mData[month].nonopInc += total;
      else mData[month].opInc += total;
    } else if (r.type === 'expense') {
      mData[month].exp[r.cat] = (mData[month].exp[r.cat] || 0) + (r.amount || 0);
    }
  });

  // 食材成本類別
  var foodCats = ['food'];
  // 固定/變動費用（食材以外）
  var otherExpCats = expCats.filter(function(e) { return foodCats.indexOf(e.id) === -1; });

  // 建表格
  var colHeaders = months.map(function(m) { return m + '月'; });
  var fullYear = months.map(function(m) { return year + '-' + m; });

  function mVal(month, key, cat) {
    if (!mData[month]) return 0;
    if (key === 'opInc') return mData[month].opInc;
    if (key === 'nonopInc') return mData[month].nonopInc;
    if (key === 'exp' && cat) return mData[month].exp[cat] || 0;
    return 0;
  }
  function rowTotal(key, cat) {
    return fullYear.reduce(function(s,m){ return s + mVal(m,key,cat); }, 0);
  }
  function mGross(month) {
    var food = mVal(month,'exp','food');
    return mData[month] ? mData[month].opInc - food : 0;
  }
  function mOpProfit(month) {
    var total = 0;
    otherExpCats.forEach(function(e){ total += mVal(month,'exp',e.id); });
    return mGross(month) - total;
  }
  function mNetProfit(month) {
    return mOpProfit(month) + mVal(month,'nonopInc');
  }

  function fmtCell(n) {
    if (n === 0) return '<td style="text-align:right;color:#bbb;">-</td>';
    var color = n < 0 ? '#c62828' : '';
    return '<td style="text-align:right;' + (color?'color:'+color+';':'') + '">' + fmt(n) + '</td>';
  }
  function fmtPct(val, base) {
    if (!base) return '<td style="text-align:right;color:#bbb;">-</td>';
    var p = Math.round(val/base*100);
    var color = p < 0 ? '#c62828' : '#2e7d32';
    return '<td style="text-align:right;font-size:11px;color:' + color + ';">' + p + '%</td>';
  }
  function totalCell(n, bold) {
    var color = n < 0 ? '#c62828' : '#2e7d32';
    return '<td style="text-align:right;font-weight:' + (bold?'600':'400') + ';color:' + color + ';">' + fmt(n) + '</td>';
  }

  var thStyle = 'style="padding:8px 10px;text-align:right;font-weight:500;font-size:12px;color:#666;white-space:nowrap;"';
  var thLStyle = 'style="padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#666;"';
  var separatorRow = '<tr style="background:#f5f4f0;"><td colspan="' + (months.length+2) + '" style="padding:4px;"></td></tr>';

  // 折線圖用 Canvas
  var chartMonthLabels = months.map(function(m){ return parseInt(m)+'月'; });
  var chartOpInc = fullYear.map(function(m){ return mVal(m,'opInc'); });
  var chartGross = fullYear.map(function(m){ return mGross(m); });
  var chartOpProfit = fullYear.map(function(m){ return mOpProfit(m); });

  var chartHtml = '<div class="block" style="margin-bottom:12px;">'
    + '<h3 style="margin-bottom:16px;">走勢圖</h3>'
    + '<canvas id="pl-chart" style="width:100%;height:260px;"></canvas>'
    + '</div>';

  var html = chartHtml + '<div style="overflow-x:auto;">'
    + '<table style="width:100%;border-collapse:collapse;font-size:13px;">'
    + '<thead><tr style="border-bottom:2px solid #e8e6e0;">'
    + '<th ' + thLStyle + '>項目</th>'
    + months.map(function(m){ return '<th ' + thStyle + '>' + m + '月</th>'; }).join('')
    + '<th ' + thStyle + '>全年</th>'
    + '</tr></thead><tbody>';

  function addRow(label, vals, isTotal, isPercent, baseVals) {
    var style = isTotal ? 'font-weight:600;border-top:1px solid #e8e6e0;' : '';
    html += '<tr style="' + style + '">';
    html += '<td style="padding:7px 10px;white-space:nowrap;">' + label + '</td>';
    if (isPercent) {
      fullYear.forEach(function(m, i) { html += fmtPct(vals[i], baseVals[i]); });
      html += fmtPct(vals.reduce(function(s,v){return s+v;},0), baseVals.reduce(function(s,v){return s+v;},0));
    } else {
      vals.forEach(function(v) { html += fmtCell(v); });
      var t = vals.reduce(function(s,v){return s+v;},0);
      html += totalCell(t, isTotal);
    }
    html += '</tr>';
  }

  // 營業收入
  addRow('營業收入', fullYear.map(function(m){ return mVal(m,'opInc'); }), true);
  // 食材成本
  addRow('　－食材成本', fullYear.map(function(m){ return mVal(m,'exp','food'); }));
  // 毛利
  var grossVals = fullYear.map(function(m){ return mGross(m); });
  addRow('═ 毛利', grossVals, true);
  var opIncVals = fullYear.map(function(m){ return mVal(m,'opInc'); });
  addRow('　毛利率', grossVals, false, true, opIncVals);

  html += separatorRow;

  // 各項費用
  otherExpCats.forEach(function(e) {
    addRow('　－' + e.name, fullYear.map(function(m){ return mVal(m,'exp',e.id); }));
  });

  // 營業淨利
  var opProfitVals = fullYear.map(function(m){ return mOpProfit(m); });
  addRow('═ 營業淨利', opProfitVals, true);
  addRow('　淨利率', opProfitVals, false, true, opIncVals);

  html += separatorRow;

  // 業外收入
  addRow('＋業外收入', fullYear.map(function(m){ return mVal(m,'nonopInc'); }));
  // 稅前淨利
  var netVals = fullYear.map(function(m){ return mNetProfit(m); });
  addRow('═ 稅前淨利', netVals, true);

  html += '</tbody></table></div>';
  el.innerHTML = html;

  // 渲染折線圖
  var canvas = document.getElementById('pl-chart');
  if (canvas) {
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 260 * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = '260px';
    ctx.scale(dpr, dpr);

    var W = rect.width, H = 260;
    var padL = 72, padR = 16, padT = 20, padB = 36;
    var chartW = W - padL - padR;
    var chartH = H - padT - padB;
    var n = chartMonthLabels.length;

    // 找最大最小值
    var allVals = chartOpInc.concat(chartGross).concat(chartOpProfit);
    var maxV = Math.max.apply(null, allVals.concat([0]));
    var minV = Math.min.apply(null, allVals.concat([0]));
    var range = maxV - minV || 1;

    function xPos(i) { return padL + i * chartW / (n-1); }
    function yPos(v) { return padT + chartH - (v - minV) / range * chartH; }

    // 背景格線
    ctx.strokeStyle = '#f0ede8';
    ctx.lineWidth = 1;
    for (var gi = 0; gi <= 4; gi++) {
      var gy = padT + gi * chartH / 4;
      ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(W-padR, gy); ctx.stroke();
      var gv = maxV - gi * (maxV-minV) / 4;
      ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(gv>=1000?Math.round(gv/1000)+'k':Math.round(gv), padL-6, gy+4);
    }

    // 零線
    if (minV < 0 && maxV > 0) {
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, yPos(0)); ctx.lineTo(W-padR, yPos(0)); ctx.stroke();
    }

    // 折線
    var series = [
      {data: chartOpInc,    color: '#2e7d32', label: '營業收入'},
      {data: chartGross,    color: '#1565c0', label: '毛利'},
      {data: chartOpProfit, color: '#e65100', label: '營業淨利'}
    ];

    series.forEach(function(s) {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      s.data.forEach(function(v, i) {
        if (i === 0) ctx.moveTo(xPos(i), yPos(v));
        else ctx.lineTo(xPos(i), yPos(v));
      });
      ctx.stroke();
      // 點
      s.data.forEach(function(v, i) {
        ctx.fillStyle = s.color;
        ctx.beginPath(); ctx.arc(xPos(i), yPos(v), 3, 0, Math.PI*2); ctx.fill();
      });
    });

    // X 軸標籤
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    chartMonthLabels.forEach(function(lb, i) {
      ctx.fillText(lb, xPos(i), H - 8);
    });

    // 圖例
    var lx = padL;
    series.forEach(function(s) {
      ctx.fillStyle = s.color;
      ctx.fillRect(lx, 4, 16, 3);
      ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(s.label, lx+20, 12);
      lx += ctx.measureText(s.label).width + 36;
    });
  }
}
